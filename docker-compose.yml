services:
  db:
    image: postgres:16-alpine
    container_name: rpr-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditdb}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rpr-net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  pipeline:
    build:
      context: .
    container_name: rpr-pipeline
    depends_on:
      db:
        condition: service_healthy
    environment:
      # libpq envs (usable by psycopg2 if you switch to them)
      PGHOST: db
      PGPORT: ${POSTGRES_PORT}
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}

      # Optional: let your config read a base path for scan (if you wire it later)
      BASE_PATH: ${BASE_PATH:-/data}
    volumes:
      # Persist logs/reports/csv outside the container
      - ./resources:/app/resources
      # Share de TrueNAS montada como /data dentro del contenedor
      - /mnt/rpr_share:/data:ro
    networks:
      - rpr-net

volumes:
  #datos_truenas:
  #  driver: local
  #  driver_opts:
  #    type: cifs
  #    # Apunta a la IP del TrueNAS
  #    device: //192.168.1.142/rpr
  #    o: "username=${TRUENAS_USER},password=${TRUENAS_PASS},domain=${DOMAIN},uid=1000,gid=1000,ro,noserverino,vers=3.0"
  pgdata:

networks:
  rpr-net:
    driver: bridge
