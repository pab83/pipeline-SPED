services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rpr-db
    deploy:
      resources:
        limits:
          memory: 2GB
      restart_policy:
        condition: on-failure
        delay: 30s          
        max_attempts: 10
        window: 120s       
    env_file:
      - .env
    environment:   
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rpr-net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s    
      timeout: 5s      
      retries: 5       
      start_period: 30s

  pipeline:
    build:
      context: .
    container_name: rpr-pipeline
    depends_on:
      db:
        condition: service_healthy
    deploy:
      restart_policy:
          condition: on-failure
          delay: 30s          
          max_attempts: 10
          window: 120s
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      PGHOST: db
      PGPORT: ${POSTGRES_PORT}
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

      # Optional: let your config read a base path for scan (if you wire it later)
      BASE_PATH: ${BASE_PATH:-/data}

    volumes:
      # Persist logs/reports/csv outside the container
      - ./resources:/app/resources
      # Share de TrueNAS montada como /data dentro del contenedor
      - /mnt/share:/data:ro
      # código editable
      - ./scripts:/app/scripts
      - ./api:/app/api
      # demo directory 
      - ./demo:/demo            
    networks:
      - rpr-net

volumes:
  pgdata:
  


networks:
  rpr-net:
    driver: bridge



